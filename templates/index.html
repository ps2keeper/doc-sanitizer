<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档敏感词替换工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">🔒 文档敏感词替换工具</h1>

        <div class="row g-4">
            <!-- 敏感词管理面板 -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">敏感词配置</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary" onclick="importWords()">导入</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="exportWords()">导出</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="newWord" class="form-control" placeholder="敏感词">
                            <input type="text" id="newReplacement" class="form-control" placeholder="替换词">
                            <button class="btn btn-primary" onclick="addWord()">添加</button>
                        </div>
                        <table class="table table-sm">
                            <thead><tr><th style="width:36px"></th><th>敏感词</th><th>替换词</th><th style="width:32px"></th></tr></thead>
                            <tbody id="wordsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 上传与处理面板 -->
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header"><h5 class="mb-0">上传与处理</h5></div>
                    <div class="card-body">
                        <div id="dropZone" class="border rounded p-4 text-center mb-3">
                            <p class="mb-0 text-muted">拖拽 .docx、.txt 或 .pdf 文件到这里，或</p>
                            <input type="file" id="fileInput" accept=".docx,.txt,.pdf" class="form-control mt-2">
                        </div>
                        <button id="processBtn" class="btn btn-success w-100" onclick="processDocument()" disabled>
                            处理文档
                        </button>
                        <div id="progress" class="mt-3 d-none">
                            <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%">处理中...</div></div>
                        </div>
                        <div id="auditResult" class="mt-3 d-none"></div>
                        <div id="downloadLinks" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">
    <script src="/static/js/main.js"></script>
</body>
</html>
